<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Pagina nu există</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:'Google Sans','Roboto',system-ui,-apple-system,sans-serif;background:#0f0f10;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
    .wrap{max-width:560px;}
    .badge{display:inline-block;border:2px solid rgba(255,255,255,.85);border-radius:18px;padding:28px 56px;margin-bottom:28px;}
    .badge h1{font-size:84px;font-weight:700;letter-spacing:1px;line-height:1;}
    p.msg{font-size:20px;font-weight:400;color:#dadada;margin-bottom:28px;line-height:1.5;}
    a.home{display:inline-block;padding:11px 26px;border:1px solid rgba(255,255,255,.6);border-radius:999px;color:#fff;text-decoration:none;font-size:14px;font-weight:500;transition:background .2s,color .2s;}
    a.home:hover{background:#fff;color:#0f0f10;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge"><h1>404</h1></div>
    <p class="msg">Această pagină nu există.</p>
    <a class="home" href="/">Înapoi la Acasă</a>
  </div>
</body>
</html>
